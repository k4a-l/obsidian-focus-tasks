name: Release
on:
  push:
    # branches:
    #   - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
    
      - name: install
        run: npm i

      - name: build
        run: npm run build
        
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

env:
  # https://typicode.github.io/husky/guide.html#with-env-variables
  HUSKY: '0'